services:
  mysql:
    image: mysql:8.4
    container_name: legal-case-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-legal_case_db}
      MYSQL_USER: ${MYSQL_USER:-legal_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-legal_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"

  backend:
    build:
      context: ./backend
    container_name: legal-case-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-legal_case_db}
      DB_USER: ${MYSQL_USER:-legal_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-legal_password}
      JWT_SECRET: ${APP_JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: legal-case-frontend
    depends_on:
      - backend
    environment:
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "3000:3000"
  nginx:
    image: nginx:alpine
    container_name: legal-case-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
